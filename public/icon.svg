<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#000d08"/>
  <g transform="translate(256,256)" fill="none" stroke="#00ff88" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hull -->
    <ellipse cx="0" cy="20" rx="160" ry="50"/>
    <!-- Conning tower -->
    <rect x="-30" y="-50" width="60" height="45" rx="6"/>
    <!-- Periscope -->
    <line x1="0" y1="-50" x2="0" y2="-80"/>
    <line x1="-10" y1="-80" x2="10" y2="-80"/>
    <!-- Propeller -->
    <line x1="160" y1="20" x2="190" y2="20"/>
    <ellipse cx="195" cy="20" rx="6" ry="22"/>
    <!-- Dive planes -->
    <line x1="-130" y1="5" x2="-155" y2="-15"/>
    <line x1="-130" y1="35" x2="-155" y2="55"/>
  </g>
</svg>
